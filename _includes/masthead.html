{% include base_path %}

<header class="site-header">
  <div class="site-header__inner">
    <div class="site-identity">
      <a class="site-name" href="{{ base_path }}/">{{ site.title }}</a>
      {% if site.author.bio %}<p class="site-tagline">{{ site.author.bio }}</p>{% endif %}
    </div>

    <nav class="nav-sections">
      {% for link in site.data.navigation.main %}
        {% if link.url contains 'http' %}{% assign domain = '' %}{% else %}{% assign domain = base_path %}{% endif %}
        <a href="{{ domain }}{{ link.url }}"{% if link.target %} target="{{ link.target }}" rel="noopener"{% endif %}>{{ link.title }}</a>
      {% endfor %}

      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle light and dark mode" title="Toggle light / dark mode">
        <i class="fa-solid fa-moon icon-moon" aria-hidden="true"></i>
        <i class="fa-solid fa-sun icon-sun" aria-hidden="true"></i>
      </button>
    </nav>
  </div>
</header>
